<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #f7f7f7;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 950px;
        min-height: 900px;
        background: white;
        padding: 40px 60px;
        border-radius: 22px;
        margin-top: 40px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        position: relative;
        padding-bottom: 120px;
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 32px;
        font-weight: 700;
    }

    h2 {
        text-align: center;
        margin-bottom: 35px;
        font-size: 22px;
        font-weight: 500;
        color: #555;
    }

    .grid {
        margin-top: 25px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 26px;
    }

    .tile {
        background: #fff;
        border-radius: 16px;
        border: 1px solid #ccc;
        cursor: pointer;
        transition: 0.25s;
        position: relative;
        overflow: visible;
    }

    .tile:hover {
        transform: scale(1.03);
        box-shadow: 0 8px 22px rgba(0,0,0,0.15);
    }

    .tile.selected {
        border: 3px solid black;
    }

    .tile img {
        width: 100%;
        height: 260px;
        object-fit: cover;
        border-radius: 16px 16px 0 0;
    }

    .tile-label {
        padding: 16px;
        font-size: 22px;
        font-weight: 600;
        text-align: center;
        position: relative;
    }

    .tip-wrapper {
        position: relative;
        display: inline-block;
        margin-left: 6px;
    }

    .tip-icon {
        font-size: 18px;
        background: #eee;
        border-radius: 50%;
        width: 26px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #ccc;
        cursor: pointer;
    }

    .tooltip-bubble {
        position: absolute;
        top: 34px;
        left: 50%;
        transform: translateX(-50%);
        background: #fff;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid #ddd;
        box-shadow: 0 6px 18px rgba(0,0,0,0.18);
        width: 250px;
        font-size: 15px;
        display: none;
        z-index: 99;
    }

    .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 950px;
        background: white;
        border-top: 1px solid #ccc;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 30px;
        box-shadow: 0 -4px 18px rgba(0,0,0,0.12);
        border-radius: 18px 18px 0 0;
    }

    .back-btn {
        font-size: 20px;
        font-weight: 600;
        cursor: pointer;
        color: #444;
    }

    .price-box {
        font-size: 26px;
        font-weight: 700;
    }

    .next-btn {
        padding: 12px 24px;
        font-size: 20px;
        font-weight: 700;
        background: #111;
        color: white;
        border-radius: 12px;
        cursor: pointer;
        opacity: 0.4;
        pointer-events: none;
    }

    .next-btn.active {
        opacity: 1;
        pointer-events: auto;
    }
</style>
</head>

<body>

<div class="container">
    <h1>CHOOSE DESIGN VARIANT</h1>
    <h2 id="designTitle"></h2>

    <div id="variantGrid" class="grid"></div>
</div>

<div class="bottom-bar">
    <div class="back-btn" onclick="goBack()">← Back</div>
    <div class="price-box" id="priceBox">$0.00</div>
    <div class="next-btn" id="nextBtn">Continue</div>
</div>

<script>

/* ============================================================
   PRICE CONFIG — EDIT THESE VALUES
   ============================================================ */

// design → price per sq ft
const DESIGN_PRICE = {
    board_batten: 12,       // EDIT HERE
    modern_geometric: 16,   // EDIT HERE
    slat_shiplap: 10,       // EDIT HERE
    herringbone: 20         // EDIT HERE
};

// variant coefficients (must match variant order)
const VARIANT_COEF = {
    0: 1.00,   // EDIT HERE
    1: 1.15,   // EDIT HERE
    2: 1.30    // EDIT HERE (if design has only 2 variants — ignore)
};
/* ============================================================ */

const params = new URLSearchParams(window.location.search);
const design = params.get("design");
const area = parseFloat(params.get("area") || 0);

let heightCoef = parseFloat(localStorage.getItem("heightCoef") || "1");

// DESIGN VARIANT MAP
const designMap = {
    "board_batten": {
        title: "Board & Batten",
        variants: [
            { img: "variant_bb1.jpg", tip: "Classic layout.", label: "Variant 1" },
            { img: "variant_bb2.jpg", tip: "Horizontal boards added.", label: "Variant 2" },
            { img: "variant_bb3.jpg", tip: "Grid-style pattern.", label: "Variant 3" }
        ]
    },
    "modern_geometric": {
        title: "Modern Geometric",
        variants: [
            { img: "variant_mg1.jpg", tip: "Diagonal geometry.", label: "Diagonal Pattern" },
            { img: "variant_mg2.jpg", tip: "Mixed geometric lines.", label: "Geometric Lines" }
        ]
    },
    "slat_shiplap": {
        title: "Slat Wall / Shiplap",
        variants: [
            { img: "variant_slat1.jpg", tip: "Vertical slats.", label: "Vertical Slats" },
            { img: "variant_slat2.jpg", tip: "Horizontal slats.", label: "Horizontal Slats" }
        ]
    },
    "herringbone": {
        title: "Herringbone / Chevron",
        variants: [
            { img: "variant_hc1.jpg", tip: "Herringbone pattern.", label: "Herringbone" },
            { img: "variant_hc2.jpg", tip: "Chevron pattern.", label: "Chevron" }
        ]
    }
};

document.getElementById("designTitle").textContent = designMap[design].title;

const grid = document.getElementById("variantGrid");

// Build tiles
designMap[design].variants.forEach((v, index) => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
        <img src="img/${v.img}">
        <div class="tile-label">
            ${v.label}
            <span class="tip-wrapper">
                <span class="tip-icon" onclick="toggleTip(event,'tip${index}')">?</span>
                <div class="tooltip-bubble" id="tip${index}">
                    ${v.tip}
                </div>
            </span>
        </div>
    `;

    tile.onclick = e => selectVariant(e, index);
    grid.appendChild(tile);
});

// PRICE CALCULATION
function calculatePrice(variantIndex) {
    const basePrice = DESIGN_PRICE[design];        // design price per sq ft
    const varCoef   = VARIANT_COEF[variantIndex];  // variant coefficient

    let calc = area * basePrice * heightCoef * varCoef;
    return calc;
}

let selectedIndex = null;

// SELECT VARIANT
function selectVariant(e, index) {
    selectedIndex = index;

    document.querySelectorAll(".tile").forEach(t => t.classList.remove("selected"));
    e.currentTarget.classList.add("selected");

    const price = calculatePrice(index);
    document.getElementById("priceBox").textContent = "$" + price.toFixed(2);

    const nextBtn = document.getElementById("nextBtn");
    nextBtn.classList.add("active");

    nextBtn.onclick = () => {
        window.location.href =
            `step3.html?design=${design}&variant=${index}&area=${area}&price=${price.toFixed(2)}`;
    };
}

// TOOLTIP
function toggleTip(event, id) {
    event.stopPropagation();
    document.querySelectorAll(".tooltip-bubble").forEach(t => t.style.display = "none");
    const bubble = document.getElementById(id);
    bubble.style.display = "block";
    setTimeout(() => bubble.style.display = "none", 3000);
}

document.body.addEventListener("click", () => {
    document.querySelectorAll(".tooltip-bubble").forEach(t => t.style.display = "none");
});

// BACK BUTTON
function goBack() {
    window.location.href = "step2.html?area=" + area;
}
</script>

</body>
</html>
