<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #f7f7f7;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 950px;
        min-height: 900px;
        background: white;
        padding: 40px 60px 120px;
        border-radius: 22px;
        margin-top: 40px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        position: relative;
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 32px;
        font-weight: 700;
    }

    .label {
        font-size: 20px;
        font-weight: 600;
        margin-top: 22px;
        display: block;
    }

    .input-field {
        margin-top: 10px;
        padding: 12px 14px;
        font-size: 18px;
        border-radius: 12px;
        border: 1px solid #bbb;
        width: 100%;
        max-width: 380px;
    }

    .upload-btn {
        width: 100%;
        padding: 20px;
        background: #f5f5f5;
        border-radius: 14px;
        border: 2px solid #ccc;
        font-size: 20px;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        margin-top: 20px;
        transition: 0.25s;
    }

    .upload-btn:hover {
        background: #ececec;
        transform: scale(1.02);
        box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .file-name {
        font-size: 16px;
        margin-top: 10px;
        color: #444;
    }

    .textarea {
        width: 100%;
        min-height: 130px;
        padding: 14px;
        font-size: 17px;
        border-radius: 14px;
        border: 2px solid #bbb;
        margin-top: 10px;
        resize: vertical;
    }

    .center { text-align: center; }
    .hidden { display: none; }

    .submit-btn {
        margin-top: 35px;
        padding: 16px 28px;
        background: #111;
        color: white;
        border-radius: 14px;
        font-size: 22px;
        font-weight: 700;
        cursor: pointer;
        width: 280px;
        transition: 0.25s;
        text-align: center;
        display: block;
        margin-left: auto;
        margin-right: auto;
        opacity: 0.4;
        pointer-events: none;
    }

    .submit-btn.active {
        opacity: 1;
        pointer-events: auto;
    }

    .continue-btn {
        margin-top: 20px;
        display: inline-block;
        padding: 14px 24px;
        font-size: 20px;
        font-weight: 700;
        background: #111;
        color: white;
        border-radius: 14px;
        cursor: pointer;
        transition: 0.25s;
    }

</style>
</head>

<body>

<div class="container">

    <h1>CUSTOM DESIGN REQUEST</h1>

    <!-- Upload -->
    <label for="fileInput" class="upload-btn">UPLOAD FILE</label>
    <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none;">
    <div id="fileName" class="file-name"></div>

    <!-- Description -->
    <label class="label">Describe your custom design</label>
    <textarea id="description" class="textarea" placeholder="Describe design details..."></textarea>

    <!-- Email -->
    <label class="label">Your Email</label>
    <input id="emailInput" class="input-field" type="email" placeholder="example@email.com">

    <!-- Submit -->
    <div id="submitBtn" class="submit-btn">SUBMIT</div>

    <!-- Communication method -->
    <div id="contactBlock" class="hidden center" style="margin-top:40px;">
        <h2 style="font-size:22px;">How would you prefer to communicate?</h2>

        <div class="continue-btn" onclick="chooseMethod('email')">Email</div>
        <div class="continue-btn" style="margin-left:15px; background:#444;" onclick="chooseMethod('phone')">Phone</div>
    </div>

    <!-- Phone -->
    <div id="phoneBlock" class="hidden center" style="margin-top:30px;">
        <div style="font-size:20px; font-weight:600; margin-bottom:10px;">Enter your phone</div>
        <input id="phoneInput" class="input-field" type="text" placeholder="+1 512 555 0000">
        <div class="continue-btn" style="margin-top:20px;" onclick="finishWithPhone()">Finish</div>
    </div>

    <!-- Final Message -->
    <div id="finalMessage" class="hidden center" style="margin-top:40px; font-size:24px; font-weight:700;">
        Thank you! Our project manager will contact you shortly.
    </div>

    <!-- New Quote -->
    <div id="anotherQuote" class="hidden center" style="margin-top:25px;">
        <div class="continue-btn" onclick="startNewQuote()" style="width:260px;">
            MAKE ANOTHER QUOTE
        </div>
    </div>

</div>

<script>
const webhook = "https://wallartacwllc.app.n8n.cloud/webhook/accentwall/order";

let fileBase64 = null;

let collected = {
    type: "CUSTOM DESIGN REQUEST",
    design: "CUSTOM",
    variant: "CUSTOM",
    description: "",
    email: "",
    phone: null,
    file: null
};

/* Upload */
document.getElementById("fileInput").addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    if (file.size > 10 * 1024 * 1024) {
        alert("Maximum file size is 10 MB");
        return;
    }

    document.getElementById("fileName").textContent = "Selected: " + file.name;

    const reader = new FileReader();
    reader.onload = () => { 
        fileBase64 = reader.result;
        collected.file = fileBase64;
    };
    reader.readAsDataURL(file);
});

/* Activate submit when email entered */
document.getElementById("emailInput").addEventListener("input", () => {
    const val = document.getElementById("emailInput").value.trim();
    const btn = document.getElementById("submitBtn");

    if (val && val.includes("@")) btn.classList.add("active");
    else btn.classList.remove("active");
});

/* Step 1 Submit */
document.getElementById("submitBtn").onclick = () => {
    const email = document.getElementById("emailInput").value.trim();
    if (!email.includes("@")) {
        alert("Enter a valid email");
        return;
    }

    collected.email = email;
    collected.description = document.getElementById("description").value.trim();

    document.getElementById("contactBlock").classList.remove("hidden");
};

/* Choose contact method */
function chooseMethod(method) {
    if (method === "email") finishAndSend(null);
    else document.getElementById("phoneBlock").classList.remove("hidden");
}

/* Phone finish */
function finishWithPhone() {
    const phone = document.getElementById("phoneInput").value.trim();
    if (!phone) {
        alert("Enter phone number");
        return;
    }
    finishAndSend(phone);
}

/* Send to n8n */
function finishAndSend(phone) {
    collected.phone = phone || null;

    fetch(webhook, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        mode: "no-cors",
        body: JSON.stringify(collected)
    });

    document.getElementById("finalMessage").classList.remove("hidden");

    setTimeout(() => {
        document.getElementById("anotherQuote").classList.remove("hidden");
    }, 1000);
}

/* New Quote */
function startNewQuote() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
