<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accent Wall — Custom Upload</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        .upload-box {
            border: 2px dashed #666;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 20px;
            background: #f1f1f1;
        }

        .textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #aaa;
            font-size: 16px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<div class="container" id="mainContainer">

    <h1 class="title">CUSTOM DESIGN UPLOAD</h1>

    <!-- Upload box -->
    <label for="fileInput" class="upload-box">
        Click to upload your image / sketch / PDF
    </label>
    <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none;" />

    <div id="fileName" style="font-size:16px; margin-bottom:20px;"></div>

    <!-- Description -->
    <label class="label">Describe your custom design</label>
    <textarea id="description" class="textarea" placeholder="Type here..."></textarea>

    <!-- Email -->
    <label class="label" style="margin-top:25px;">Enter your email</label>
    <input type="email" id="emailInput" placeholder="example@email.com">

    <button id="continueBtn" class="continue-btn" style="margin-top:25px;">
        CONTINUE
    </button>

    <!-- Contact method -->
    <div id="contactMethodBlock" class="hidden" style="margin-top:35px; text-align:center;">
        <h2 style="font-size:22px;">How would you prefer to communicate?</h2>

        <button class="continue-btn" style="background:#444; margin-top:15px;"
                onclick="selectContactMethod('email')">Email</button>

        <button class="continue-btn" style="margin-top:15px;"
                onclick="selectContactMethod('phone')">Phone</button>
    </div>

    <!-- Phone input -->
    <div id="phoneBlock" class="hidden" style="margin-top:25px;">
        <label class="label">Enter your phone number</label>
        <input type="text" id="phoneInput" placeholder="+1 512 555 0000">
        <button id="finishBtn" class="continue-btn" style="margin-top:15px;">FINISH</button>
    </div>

    <!-- Final message -->
    <div id="finalMessage" class="hidden" style="margin-top:35px; text-align:center; font-size:22px; font-weight:700;">
        Thank you! Our project manager will contact you shortly.
    </div>

    <div id="anotherQuote" class="hidden" style="margin-top:25px; text-align:center;">
        <button class="continue-btn" onclick="startNewQuote()">Make another quote</button>
    </div>

</div>

<script>
let uploadedFileBase64 = null;

// -----------------------------
// File Upload → convert to Base64
// -----------------------------
document.getElementById("fileInput").addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    document.getElementById("fileName").textContent = "Uploaded: " + file.name;

    const reader = new FileReader();
    reader.onload = function () {
        uploadedFileBase64 = reader.result;
    };
    reader.readAsDataURL(file);
});

// Reveal contact options
document.getElementById("continueBtn").onclick = () => {
    const email = document.getElementById("emailInput").value.trim();
    if (!email) {
        alert("Please enter your email");
        return;
    }
    document.getElementById("contactMethodBlock").classList.remove("hidden");
    window.collectedEmail = email;
};

// Choose contact method
function selectContactMethod(method) {
    if (method === "email") {
        finishOrder(null);
    } else {
        document.getElementById("phoneBlock").classList.remove("hidden");
    }
}

// If phone selected → finish
document.getElementById("finishBtn").onclick = () => {
    const phone = document.getElementById("phoneInput").value.trim();
    if (!phone) {
        alert("Please enter phone number");
        return;
    }
    finishOrder(phone);
};

// -----------------------------
// SEND TO N8N
// -----------------------------
async function finishOrder(phone) {
    document.getElementById("finalMessage").classList.remove("hidden");
    document.getElementById("anotherQuote").classList.remove("hidden");

    const payload = {
        type: "CUSTOM DESIGN REQUEST",
        design: "CUSTOM",
        variant: "CUSTOM",
        description: document.getElementById("description").value.trim(),
        email: window.collectedEmail,
        phone: phone || null,
        file: uploadedFileBase64
    };

    try {
        await fetch("https://wallartacwllc.app.n8n.cloud/webhook/accentwall/order", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            mode: "no-cors",
            body: JSON.stringify(payload)
        });
    } catch (e) {
        console.log("Error sending data:", e);
    }
}

// Start new quote
function startNewQuote() {
    localStorage.clear();
    window.location.href = "index.html";
}
</script>

</body>
</html>
