<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accent Wall — Step 4</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h1 class="title">WALL PREPARATION</h1>

    <div id="prepContainer"></div>

</div>

<!-- Bottom Navigation -->
<div class="bottom-bar">
    <button class="nav-btn back-btn" onclick="goBack()">BACK</button>
    <button class="nav-btn next-btn" id="continueBtn" disabled>CONTINUE</button>
</div>

<!-- Tooltip image overlay -->
<div id="tooltipOverlay" class="tooltip-image"></div>

<script>
let selectedPrep = null;

// -----------------------------
// PREPARATION OPTIONS
// -----------------------------
const prepOptions = [
    {
        name: "Smooth wall finish",
        img: "prep_smooth.jpg",
        tip: "prep_smooth_tip.jpg"
    },
    {
        name: "Keep existing wall texture",
        img: "prep_texture.jpg",
        tip: "prep_texture_tip.jpg"
    }
];

// -----------------------------
// BUILD UI
// -----------------------------
function loadPrepOptions() {
    const container = document.getElementById("prepContainer");

    prepOptions.forEach((opt, index) => {
        const box = document.createElement("div");
        box.className = "variant-box";
        box.onclick = () => selectPrep(index);

        box.innerHTML = `
            <img src="img/${opt.img}">
            <div class="variant-title">
                ${opt.name}
                <span class="tooltip-icon" onclick="event.stopPropagation(); showTip('${opt.tip}')">?</span>
            </div>
        `;

        container.appendChild(box);
    });
}

loadPrepOptions();

// -----------------------------
// SELECT OPTION
// -----------------------------
function selectPrep(i) {
    selectedPrep = i;

    document.querySelectorAll(".variant-box").forEach((el, idx) => {
        el.classList.toggle("variant-selected", idx === i);
    });

    const btn = document.getElementById("continueBtn");
    btn.disabled = false;
    btn.style.opacity = "1";
}

// -----------------------------
// SHOW TOOLTIP IMAGE
// -----------------------------
function showTip(imgName) {
    const overlay = document.getElementById("tooltipOverlay");
    overlay.innerHTML = `<img src="img/${imgName}">`;
    overlay.classList.add("visible");
    overlay.onclick = () => overlay.classList.remove("visible");
}

// -----------------------------
// CONTINUE → Step 5
// -----------------------------
document.getElementById("continueBtn").onclick = () => {
    const chosen = prepOptions[selectedPrep].name;
    localStorage.setItem("step4_prep", chosen);

    window.location.href = "step5.html";
};

// -----------------------------
// BACK BUTTON
// -----------------------------
function goBack() {
    window.location.href = "step3.html";
}
</script>

</body>
</html>
