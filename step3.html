<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #f7f7f7;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 950px;
        min-height: 850px;
        background: white;
        padding: 40px 60px;
        border-radius: 22px;
        margin-top: 40px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        position: relative;
        padding-bottom: 120px;
    }

    h1 {
        text-align: center;
        font-size: 32px;
        margin-bottom: 30px;
        font-weight: 700;
    }

    .option-btn {
        width: 100%;
        padding: 26px 30px;
        font-size: 24px;
        font-weight: 600;
        border: 2px solid #ccc;
        border-radius: 16px;
        margin-bottom: 30px;
        cursor: pointer;
        text-align: center;
        background: #fafafa;
        transition: 0.25s;
        position: relative;
    }

    .option-btn:hover {
        background: #f0f0f0;
        transform: scale(1.01);
    }

    .option-btn.selected {
        border: 3px solid black;
        background: #fff;
        box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .tip-icon {
        font-size: 18px;
        background: #eee;
        border-radius: 50%;
        width: 26px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #ccc;
        cursor: pointer;
        margin-left: 8px;
    }

    #tooltip {
        position: absolute;
        display: none;
        background: white;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid #ddd;
        width: 260px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.18);
        z-index: 999;
    }

    .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 950px;
        background: white;
        border-top: 1px solid #ccc;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 30px;
        box-shadow: 0 -4px 18px rgba(0,0,0,0.12);
        border-radius: 18px 18px 0 0;
    }

    .back-btn {
        font-size: 20px;
        font-weight: 600;
        cursor: pointer;
        color: #444;
    }

    .price-box {
        font-size: 26px;
        font-weight: 700;
    }

    .next-btn {
        padding: 12px 24px;
        font-size: 20px;
        font-weight: 700;
        background: #111;
        color: white;
        border-radius: 12px;
        cursor: pointer;
        opacity: 0.4;
        pointer-events: none;
        transition: 0.25s;
    }

    .next-btn.active {
        opacity: 1;
        pointer-events: auto;
    }
</style>
</head>

<body>

<div class="container">
    <h1>WALL PREPARATION</h1>

    <div class="option-btn" onclick="selectPrep('smooth', event)">
        Smooth Wall Preparation
        <span class="tip-icon" onclick="showTip(event, 'smooth')">?</span>
    </div>

    <div class="option-btn" onclick="selectPrep('texture', event)">
        Textured Wall Preparation
        <span class="tip-icon" onclick="showTip(event, 'texture')">?</span>
    </div>
</div>

<div id="tooltip"></div>

<div class="bottom-bar">
    <div class="back-btn" onclick="goBack()">← Back</div>
    <div class="price-box" id="priceBox">$0.00</div>
    <div class="next-btn" id="nextBtn">Continue</div>
</div>

<script>

/* ============================================
   STEP 3 PRICE CONFIGURATION  
   — YOU CAN EDIT THESE VALUES
   ============================================ */

// EDIT HERE ↓↓↓
const PREP_COEF = {
    smooth: 2.0,     // smooth wall doubles price
    texture: 1.0     // texture leaves price unchanged
};
// EDIT HERE ↑↑↑


/* GET URL PARAMETERS */
const params = new URLSearchParams(window.location.search);
const area = parseFloat(params.get("area"));
const design = params.get("design");
const variant = params.get("variant");
const previousPrice = parseFloat(params.get("price")); 


/* Show previous price immediately */
document.getElementById("priceBox").textContent = "$" + previousPrice.toFixed(2);


let selected = null;


/* PRICE UPDATE */
function updatePrice() {
    if (!selected) return;

    let coef = PREP_COEF[selected];  // GET COEFFICIENT FROM CONFIG
    let newPrice = previousPrice * coef;

    document.getElementById("priceBox").textContent = "$" + newPrice.toFixed(2);
}


/* SELECT OPTION */
function selectPrep(type, event) {
    selected = type;

    document.querySelectorAll(".option-btn").forEach(btn => btn.classList.remove("selected"));
    event.currentTarget.classList.add("selected");

    document.getElementById("nextBtn").classList.add("active");

    updatePrice();
}


/* TOOLTIP IMAGE POPUP */
function showTip(event, type) {
    event.stopPropagation();
    const tooltip = document.getElementById("tooltip");

    tooltip.innerHTML = `<img src="img/prep_${type}.jpg" style="width:100%;border-radius:10px;">`;

    const rect = event.target.getBoundingClientRect();
    tooltip.style.left = rect.left + 30 + "px";
    tooltip.style.top = rect.top - 10 + "px";

    tooltip.style.display = "block";

    setTimeout(() => tooltip.style.display = "none", 3500);
}

document.body.addEventListener("click", () => {
    document.getElementById("tooltip").style.display = "none";
});


/* GO BACK */
function goBack() {
    window.location.href = `step2_variant.html?design=${design}&area=${area}`;
}


/* CONTINUE */
document.getElementById("nextBtn").onclick = () => {
    if (!selected) return;

    const finalPrice = parseFloat(
        document.getElementById("priceBox").textContent.replace("$", "")
    );

    window.location.href =
        `step4.html?design=${design}&variant=${variant}&prep=${selected}&area=${area}&price=${finalPrice}`;
};

</script>

</body>
</html>
